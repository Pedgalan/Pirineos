<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pirineos en autocaravana · Junio 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,600;1,400;1,600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --night: #1C2E40;
  --ink: #2A1F14;
  --sand: #F2E8D9;
  --sand-dark: #E8D9C5;
  --pine: #3D6B4F;
  --amber: #D4882E;
  --amber-light: #E8A84A;
  --paper: #FAF6EF;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--sand);
  font-family: 'Source Sans 3', sans-serif;
  color: var(--ink);
  min-height: 100vh;
}

/* ─── PORTADA ─── */
.cover {
  background: var(--night);
  padding: 72px 24px 56px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 120%, rgba(61,107,79,0.35) 0%, transparent 65%);
}

.cover-eyebrow {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--amber-light);
  margin-bottom: 18px;
  position: relative;
}

.cover-title {
  font-family: 'Cormorant Garant', serif;
  font-size: clamp(38px, 8vw, 64px);
  font-weight: 600;
  color: var(--sand);
  line-height: 1.1;
  position: relative;
  margin-bottom: 12px;
}

.cover-title em {
  font-style: italic;
  color: var(--amber-light);
}

.cover-subtitle {
  font-family: 'Cormorant Garant', serif;
  font-style: italic;
  font-size: 18px;
  color: rgba(242,232,217,0.65);
  position: relative;
  margin-bottom: 40px;
}

.cover-rule {
  width: 48px;
  height: 1px;
  background: var(--amber);
  margin: 0 auto 16px;
  position: relative;
}

.cover-dogs {
  font-size: 26px;
  position: relative;
  letter-spacing: 4px;
}

/* ─── RUTA ─── */
.route-bar {
  background: var(--night);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.route-stop {
  font-size: 12px;
  color: rgba(242,232,217,0.5);
  font-weight: 300;
  letter-spacing: 0.05em;
}

.route-stop.active {
  color: var(--amber-light);
  font-weight: 600;
}

.route-arrow {
  color: rgba(242,232,217,0.25);
  font-size: 10px;
}

/* ─── CONTENIDO ─── */
.main {
  max-width: 680px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

.section-day {
  margin-bottom: 60px;
}

.day-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--sand-dark);
  padding-bottom: 12px;
}

.day-number {
  font-family: 'Cormorant Garant', serif;
  font-size: 48px;
  font-weight: 600;
  color: var(--night);
  line-height: 1;
}

.day-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--pine);
}

/* ─── ENTRADA ─── */
.entry {
  background: var(--paper);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 32px;
  box-shadow: 0 2px 12px rgba(28,46,64,0.08), 0 0 0 1px rgba(28,46,64,0.05);
}

/* Polaroid: foto rotada */
.entry-photo-wrap {
  padding: 16px 16px 8px;
  background: #fff;
}

.entry-photo-wrap img {
  width: 100%;
  display: block;
  border-radius: 1px;
  max-height: 420px;
  object-fit: cover;
}

.entry-photo-caption {
  font-family: 'Cormorant Garant', serif;
  font-style: italic;
  font-size: 13px;
  color: #888;
  text-align: center;
  padding: 6px 0 8px;
}

.entry-body {
  padding: 20px 22px 22px;
}

.entry-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.entry-place {
  font-family: 'Cormorant Garant', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--night);
  line-height: 1.2;
  flex: 1;
}

.entry-time {
  font-size: 12px;
  color: #aaa;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}

.entry-mood {
  font-size: 22px;
  flex-shrink: 0;
}

.entry-notes {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink);
  margin-bottom: 14px;
}

.entry-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--pine);
  background: rgba(61,107,79,0.1);
  padding: 3px 9px;
  border-radius: 2px;
}

.entry-video {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--night);
  color: var(--sand);
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 2px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.03em;
  margin-bottom: 14px;
}

/* ─── EMPTY DAY ─── */
.entry-empty {
  padding: 32px;
  text-align: center;
  color: #bbb;
  font-family: 'Cormorant Garant', serif;
  font-style: italic;
  font-size: 18px;
  border: 1px dashed var(--sand-dark);
  border-radius: 2px;
}

/* ─── PIE ─── */
.footer {
  background: var(--night);
  color: rgba(242,232,217,0.45);
  text-align: center;
  padding: 32px 24px;
  font-size: 12px;
  font-family: 'Source Sans 3', sans-serif;
  letter-spacing: 0.08em;
}

.footer strong {
  color: var(--amber-light);
  letter-spacing: 0.12em;
}
</style>
</head>
<body>

<!-- PORTADA -->
<div class="cover">
  <div class="cover-eyebrow">🏔 Diario de ruta · Junio 2026</div>
  <div class="cover-title">Pirineos en<br><em>autocaravana</em></div>
  <div class="cover-subtitle">Una familia, dos perrines, cinco días.</div>
  <div class="cover-rule"></div>
  <div class="cover-dogs">🐕 🐕</div>
</div>

<!-- BARRA DE RUTA -->
<div class="route-bar">
  <span class="route-stop">Salida</span>
  <span class="route-arrow">▸</span>
  <span class="route-stop active" id="ruta-paradas">Aínsa</span>
  <span class="route-arrow">▸</span>
  <span class="route-stop">···</span>
  <span class="route-arrow">▸</span>
  <span class="route-stop">Llegada</span>
</div>

<!-- CONTENIDO -->
<div class="main" id="contenido">
  <!-- Se rellena con JS -->
</div>

<!-- PIE -->
<div class="footer">
  <strong>PIRINEOS EN AUTOCARAVANA</strong> · Junio 2026<br>
  Actualizado el <span id="fecha-actualizacion"></span>
</div>

<script>
const ENTRADAS = [{"id": "1782540075731", "day": "2", "location": "Parking autocaravanas Aínsa.", "notes": "A las 7 de la mañana, dando un paseo con los dos perrines.", "mood": "😍", "tags": ["Paisaje"], "photos": ["https://pedgalan.github.io/Pirineos/fotos/dia2-ainsa-01.jpg"], "videoUrl": "", "time": "08:01", "ts": "2026-06-27T06:01:15.730Z"}, {"id": "1782546977588", "day": "1", "location": "Ainsa", "notes": "De camino a la cena en Ainsa", "mood": "😄", "tags": [], "photos": ["https://pedgalan.github.io/Pirineos/fotos/dia1-ainsa-01.jpg"], "videoUrl": "https://share.icloud.com/photos/08eBTPkFe2wYYjQrChQBgiRiQ", "time": "09:56", "ts": "2026-06-27T07:56:17.587Z"}];

const DIAS_LABEL = ['', 'Día 1', 'Día 2', 'Día 3', 'Día 4', 'Día 5'];

function formatFecha(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
}

function agruparPorDia(entradas) {
  const grupos = {};
  entradas.forEach(e => {
    const d = e.day || '1';
    if (!grupos[d]) grupos[d] = [];
    grupos[d].push(e);
  });
  return grupos;
}

function renderEntrada(e) {
  const foto = e.photos && e.photos.length > 0
    ? `<div class="entry-photo-wrap">
        <img src="${e.photos[0]}" alt="${e.location}" loading="lazy">
        <div class="entry-photo-caption">${e.location}</div>
      </div>` : '';

  const video = e.videoUrl
    ? `<a class="entry-video" href="${e.videoUrl}" target="_blank">▶ Ver vídeo</a>` : '';

  const tags = e.tags && e.tags.length
    ? `<div class="entry-tags">${e.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : '';

  return `
    <div class="entry">
      ${foto}
      <div class="entry-body">
        <div class="entry-meta">
          <div class="entry-place">${e.location}</div>
          <div class="entry-time">${e.time}</div>
          <div class="entry-mood">${e.mood || ''}</div>
        </div>
        ${e.notes ? `<p class="entry-notes">${e.notes.replace(/\n/g,'<br>')}</p>` : ''}
        ${video}
        ${tags}
      </div>
    </div>`;
}

function render() {
  const contenido = document.getElementById('contenido');
  const grupos = agruparPorDia(ENTRADAS);
  const dias = Object.keys(grupos).sort((a,b) => Number(a)-Number(b));

  let html = '';
  dias.forEach(dia => {
    const entradas = grupos[dia];
    const fecha = formatFecha(entradas[0].ts);
    html += `
      <section class="section-day">
        <div class="day-header">
          <div class="day-number">${dia}</div>
          <div>
            <div class="day-label">${DIAS_LABEL[dia] || 'Día '+dia}</div>
            <div style="font-size:13px;color:#888;font-style:italic;">${fecha}</div>
          </div>
        </div>
        ${entradas.map(renderEntrada).join('')}
      </section>`;
  });

  contenido.innerHTML = html;

  // Fecha de actualización
  const hoy = new Date();
  document.getElementById('fecha-actualizacion').textContent =
    hoy.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

  // Barra de ruta: listar los lugares únicos
  const lugares = [...new Set(ENTRADAS.map(e => e.location.split('.')[0].split(',')[0].trim()))];
  if (lugares.length) {
    document.getElementById('ruta-paradas').textContent = lugares.join(' · ');
  }
}

render();
</script>
</body>
</html>
